<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>今晚预测 · 07/03 · 三场胜负</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --pitch:#0A5C3E; --pitch-2:#063B28; --gold:#F4C84A; --gold-d:#b78f2c;
    --ink:#16241E; --muted:#728178; --rednote:#FF2442; --hot:#E8662A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(120% 80% at 50% 0%,#0c3a29,#06231A 70%,#04160F);
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
    min-height:100vh;padding:26px 16px 60px;display:flex;flex-direction:column;align-items:center;gap:18px}
  .tool{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;align-items:center;max-width:600px}
  .tool .h{color:#bfd6cb;font-size:13px;width:100%;text-align:center;margin-bottom:4px}
  .tool button{background:var(--gold);color:#3a2c05;border:0;border-radius:999px;padding:9px 18px;
    font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(0,0,0,.3)}

  .page{width:560px;border-radius:30px;overflow:hidden;position:relative;
    background:linear-gradient(172deg,#0B6B49 0%,#0A5C3E 26%,#074630 100%);
    color:#fff;box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;padding-bottom:8px}
  .hd{padding:26px 30px 12px;position:relative}
  .eyebrow{font-size:12.5px;font-weight:800;letter-spacing:.15em;color:var(--gold);display:flex;align-items:center;gap:7px}
  .rednote{margin-top:11px;display:inline-flex;gap:6px;background:var(--rednote);color:#fff;font-weight:900;
    font-size:12.5px;padding:5px 12px;border-radius:8px;box-shadow:0 4px 14px rgba(255,36,66,.45)}
  .title{font-size:38px;line-height:1.03;font-weight:900;margin-top:11px;text-shadow:0 4px 16px rgba(0,0,0,.3)}
  .title em{font-style:normal;color:var(--gold)}
  .sub{margin-top:7px;font-size:13px;font-weight:700;color:#cfe6da}
  .sub .chip{background:rgba(255,255,255,.14);padding:2px 10px;border-radius:999px;margin-left:7px}

  .legend{margin:4px 16px 0;font-size:10.5px;font-weight:700;color:#bfe0d1;text-align:center;
    background:rgba(255,255,255,.06);border-radius:9px;padding:6px 8px}
  .legend b{color:var(--gold)}

  .m{margin:11px 14px 0;background:#fff;color:var(--ink);border-radius:18px;overflow:hidden}
  .mh{background:linear-gradient(135deg,#0E6E4C,#0a5237);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:900}
  .mh .tm{display:flex;align-items:center;gap:6px}
  .mh .od{font-size:10.5px;font-weight:800;color:#bfe6d4;background:rgba(255,255,255,.13);padding:1px 7px;border-radius:999px}
  .mh .time{margin-left:auto;font-size:10.5px;font-weight:800;color:#9fd6bd}

  .faceoff{display:flex;align-items:stretch}
  .side{flex:1;min-width:0;padding:9px 8px 11px}
  .side.fav{background:#F4F8F5}
  .side.dog{background:#FFF6EE}
  .shd{text-align:center;margin-bottom:8px}
  .shd .nm{font-size:15px;font-weight:900}
  .shd .pc{font-size:10.5px;font-weight:800;color:var(--muted)}
  .shd .ct{font-size:11px;font-weight:900;color:var(--pitch);margin-top:2px}
  .shd .dog-tag{font-size:10px;font-weight:900;color:#fff;background:var(--hot);padding:1px 7px;border-radius:999px;display:inline-block;margin-top:3px}
  .mid{width:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#c2ccc6;background:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:8px 7px;justify-content:center;align-content:flex-start;padding-top:8px}
  .empty{font-size:10.5px;color:#b6bfba;font-weight:700;padding:8px 0}

  /* 押注额驱动尺寸：重注更大更亮 */
  .vchip{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
  .vchip .sq{border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
    box-shadow:0 3px 8px rgba(0,0,0,.18)}
  .vchip .vn{font-size:9.5px;font-weight:800;color:#3a4a43;line-height:1;max-width:62px;text-align:center}
  .vchip .vb{font-weight:900;color:var(--gold-d);background:#FFF1CE;border-radius:999px;line-height:1.3}
  .vchip.big .vb{background:var(--gold);color:#5a4406;box-shadow:0 2px 8px rgba(244,200,74,.6)}
  .vchip .heavy{position:absolute;top:-2px;right:-8px;font-size:13px;z-index:3}
  .vchip .tagflag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:9px;font-weight:900;color:#fff;background:var(--hot);padding:2px 7px;border-radius:999px;
    box-shadow:0 3px 9px rgba(0,0,0,.28);z-index:4}
  .vchip{margin-top:6px}

  .disc{margin:11px 14px 2px;font-size:10.5px;line-height:1.5;color:#d3ebde;font-weight:600;text-align:center;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:9px 12px}
  .disc b{color:#fff}
  .foot{margin:9px 14px 2px;text-align:center;font-size:11.5px;font-weight:800;color:#bfe0d1}
  .foot b{color:var(--gold)}
</style>

<div class="tool">
  <div class="h">↓ 下载为高清 PNG（小红书竖版单图），或直接截图</div>
  <button onclick="dl()">下载今日预测图</button>
</div>

<div class="page" id="page">
  <div class="hd">
    <div class="eyebrow">⚽ AI · 世界杯竞猜实验室</div>
    <div class="rednote">📕 世界杯竞猜得现金</div>
    <div class="title">8 AI 押三场 · <em>谁敢重仓？</em></div>
    <div class="sub" id="sub"></div>
  </div>
  <div class="legend">头像<b>越大</b>=押得<b>越重</b>　·　💰最重注　·　🐺冷门独狼　·　Claude禁赛 · 今天只押「谁晋级」</div>
  <div id="matches"></div>
  <div class="disc">⚠️ <b>仅供研究与讨论</b>，不构成任何投注或决策建议 · AI 预测<b>具有随机性</b> · 金球币为虚拟积分，<b>无现金价值</b></div>
  <div class="foot">赛后见真章 · <b>每日更新</b> · 你押哪边？评论区报队 👀</div>
</div>

<script>
const DAY = { date:"07/03", stage:"1/16决赛", tag:"第3天" };

const MODELS = {
  claude:  { name:'Claude',   color:'#D97757', ini:'C'   },
  chatgpt: { name:'ChatGPT',  color:'#10A37F', ini:'GPT' },
  deepseek:{ name:'DeepSeek', color:'#2D6BF0', ini:'DS'  },
  gemini:  { name:'Gemini',   color:'#DB3E8E', ini:'GM'  },
  grok:    { name:'Grok',     color:'#1F2329', ini:'GK'  },
  qwen:    { name:'通义千问',  color:'#7C5CFF', ini:'通'  },
  doubao:  { name:'豆包',      color:'#0FB6D6', ini:'豆'  },
  glm:     { name:'智谱GLM',   color:'#3B49C9', ini:'智'  },
};

// 每场：home/away/time + 占比 + picks{ 模型id: {pick:'home'|'away', bet} }
const MATCHES = [
  { home:'西班牙', away:'奥地利', time:'03:00', oddsH:95, oddsA:5, picks:{
      gemini:{p:'home',bet:100}, doubao:{p:'home',bet:100}, grok:{p:'home',bet:100}, deepseek:{p:'home',bet:10},
      qwen:{p:'home',bet:100}, glm:{p:'home',bet:10}, chatgpt:{p:'home',bet:100} } },
  { home:'葡萄牙', away:'克罗地亚', time:'07:00', oddsH:72, oddsA:28, picks:{
      gemini:{p:'home',bet:100}, doubao:{p:'home',bet:100}, grok:{p:'home',bet:50}, deepseek:{p:'home',bet:50},
      qwen:{p:'home',bet:100}, glm:{p:'home',bet:100}, chatgpt:{p:'home',bet:100} } },
  { home:'瑞士', away:'阿尔及利亚', time:'11:00', oddsH:85, oddsA:15, picks:{
      gemini:{p:'home',bet:100}, doubao:{p:'away',bet:100}, grok:{p:'home',bet:50}, deepseek:{p:'home',bet:10},
      qwen:{p:'home',bet:100}, glm:{p:'home',bet:100}, chatgpt:{p:'home',bet:100} } },
];

document.getElementById('sub').innerHTML = `${DAY.date} · ${DAY.stage} · 3 场<span class="chip">${DAY.tag}</span>`;

// 押注额 → 头像尺寸映射
function dims(bet){
  if(bet>=200) return {sq:62,fs:23,vb:'13px',vn:'11px',big:true};
  if(bet>=100) return {sq:44,fs:16,vb:'10px',vn:'10px',big:true};
  if(bet>=50)  return {sq:31,fs:12,vb:'9px', vn:'9px',big:false};
  return {sq:23,fs:10,vb:'8px',vn:'8.5px',big:false};
}
function chip(id, bet, isDog, tag){
  const m=MODELS[id], d=dims(bet);
  const tagHTML = tag ? `<div class="tagflag">${tag}</div>` : '';
  return `<div class="vchip ${d.big?'big':''}">
    ${tagHTML}
    ${isDog?'<span class="heavy">🔥</span>':''}
    <div class="sq" style="width:${d.sq}px;height:${d.sq}px;font-size:${d.fs}px;background:${m.color}">${m.ini}</div>
    <div class="vn" style="font-size:${d.vn}">${m.name}</div>
    <div class="vb" style="font-size:${d.vb};padding:0 6px">⚽${bet}</div>
  </div>`;
}

// 全场最大单注（用于"全场最重注"浮签）
let maxBet=0;
MATCHES.forEach(mt=>Object.values(mt.picks).forEach(pk=>{ if(pk.bet>maxBet) maxBet=pk.bet; }));

const wrap=document.getElementById('matches');
MATCHES.forEach(mt=>{
  const favHome = mt.oddsH>=mt.oddsA; // 占比高的一方=热门
  const homeArr=[], awayArr=[];
  Object.keys(MODELS).forEach(id=>{
    const pk=mt.picks[id]; if(!pk) return;
    (pk.p==='home'?homeArr:awayArr).push({id,bet:pk.bet});
  });
  homeArr.sort((a,b)=>b.bet-a.bet); awayArr.sort((a,b)=>b.bet-a.bet);
  const heavyCount = [...homeArr, ...awayArr].filter(x=>x.bet===maxBet).length;
  const showHeavyTag = heavyCount === 1;
  const sideHTML=(arr, isHome)=>{
    const isFav = isHome?favHome:!favHome;
    const odds = isHome?mt.oddsH:mt.oddsA;
    const name = isHome?mt.home:mt.away;
    const loneDog = !isFav && arr.length===1; // 冷门方仅1家=独狼
    const chips = arr.length? arr.map(x=>{
        let tag='';
        if(showHeavyTag && x.bet===maxBet) tag='💰全场最重注';
        else if(loneDog) tag='🐺今日独狼';
        return chip(x.id,x.bet,!isFav,tag);
      }).join('') : `<div class="empty">无人押</div>`;
    return `<div class="side ${isFav?'fav':'dog'}">
        <div class="shd">
          <div class="nm">${name}</div>
          <div class="pc">大众 ${odds}%</div>
          <div class="ct">${arr.length} 票</div>
          ${!isFav && arr.length?'<div class="dog-tag">🔥 冷门</div>':''}
        </div>
        <div class="chips">${chips}</div>
      </div>`;
  };
  wrap.insertAdjacentHTML('beforeend', `
    <div class="m">
      <div class="mh">
        <div class="tm">${mt.home}<span class="od">${mt.oddsH}%</span></div>
        <span style="opacity:.5;font-size:12px">vs</span>
        <div class="tm">${mt.away}<span class="od">${mt.oddsA}%</span></div>
        <span class="time">${mt.time}</span>
      </div>
      <div class="faceoff">
        ${sideHTML(homeArr,true)}
        <div class="mid">VS</div>
        ${sideHTML(awayArr,false)}
      </div>
    </div>`);
});

function dl(){
  html2canvas(document.getElementById('page'),{scale:2,backgroundColor:null,useCORS:true})
    .then(c=>{const a=document.createElement('a');a.download='AI世界杯竞猜_0630预测.png';a.href=c.toDataURL('image/png');a.click();});
}
</script>
